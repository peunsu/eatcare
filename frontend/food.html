<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>(function(){var t=localStorage.getItem("nutri_theme")||"light";var e=document.documentElement;e.setAttribute("data-theme",t);e.setAttribute("data-bs-theme",t);})();</script>
  <title>EatCare · 식품 정보</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css?v=24" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand bg-white shadow-sm px-3 mb-3">
    <a class="navbar-brand section-title me-3" href="/dashboard.html" style="text-decoration:none">🥗 EatCare</a>
    <div class="navbar-nav flex-row gap-1 me-auto">
      <button class="btn btn-outline-secondary btn-sm" onclick="goBack()">← 뒤로</button>
      <a class="btn btn-outline-secondary btn-sm" href="/dashboard.html">내 대시보드</a>
      <a class="btn btn-primary btn-sm" href="/food.html">식품 정보</a>
      <a id="adminLink" class="btn btn-outline-secondary btn-sm" href="/admin.html" style="display:none">운영자 대시보드</a>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span id="who" class="text-muted small"></span>
      <button class="btn btn-outline-primary btn-sm" onclick="logout()">로그아웃</button>
      <button id="themeBtn" class="btn btn-outline-secondary btn-sm" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div class="col-lg-5">
        <div class="card">
          <div class="card-header">🔎 식품 검색</div>
          <div class="card-body">
            <input id="q" class="form-control mb-2" placeholder="식품명을 입력하세요 (예: 피자, 사과)"
                   autocomplete="off" autocapitalize="none" oninput="onInput()" />
            <div id="results" class="list-group" style="max-height:60vh;overflow:auto"></div>
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span id="detailTitle">식품 영양성분</span>
            <span id="catBadge"></span>
          </div>
          <div class="card-body" id="detailBox">
            <div id="baseSection"><p class="text-muted mb-0">왼쪽에서 식품을 검색해 선택하세요.</p></div>
            <div id="amtSection" style="display:none">
              <div class="mt-4 mb-2 d-flex align-items-center gap-2">
                <input id="amt" type="number" class="form-control form-control-sm" style="width:90px" min="0" oninput="renderDetail()" />
                <span class="text-muted"><span id="amtUnit">g</span> 기준</span>
              </div>
              <div id="nutriTable"></div>
            </div>
          </div>
        </div>
        <div class="card" id="distCard" style="display:none">
          <div class="card-header">📉 같은 분류 내 100g당 영양소 분포 <span id="distCat" class="text-muted small ms-1"></span></div>
          <div class="card-body" id="distBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/common.js?v=19"></script>
  <script>
    requireAuth();
    if (getRole() === "ADMIN") document.getElementById("adminLink").style.display = "";  // 운영자만 노출
    api("/api/members/me").then((m) => { const w = document.getElementById("who"); if (w) w.textContent = m.name + " 님"; }).catch(() => {});
    // 뒤로가기: 이전 페이지가 있으면 그쪽으로, 없으면 내 페이지로
    function goBack() {
      if (history.length > 1) history.back();
      else location.href = getRole() === "ADMIN" ? "/admin.html" : "/dashboard.html";
    }

    Chart.defaults.font.family = "Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif";
    // 분포 차트에 "이 식품" 위치를 표시하는 세로 점선 플러그인
    const MARKER_LINE = {
      id: "markerLine",
      afterDatasetsDraw(chart, args, opts) {
        if (!opts || opts.value == null) return;
        const x = chart.scales.x; if (!x) return;
        const px = x.getPixelForValue(opts.value);
        const { ctx, chartArea } = chart;
        if (px < chartArea.left || px > chartArea.right) return;
        ctx.save();
        ctx.beginPath(); ctx.setLineDash([5, 4]); ctx.lineWidth = 2; ctx.strokeStyle = "#f04452";
        ctx.moveTo(px, chartArea.top); ctx.lineTo(px, chartArea.bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
        if (opts.label) {
          const right = px > (chartArea.left + chartArea.right) / 2;
          drawChartTag(ctx, opts.label, px + (right ? -2 : 2), chartArea.top + 11, right ? "right" : "left");
        }
      },
    };
    Chart.register(MARKER_LINE);

    let current = null;  // 선택된 식품 상세
    let searchSeq = 0, timer, distCharts = [];

    function fmtPct(p) {
      if (p == null) return "-";
      return p < 1 ? "1% 이내" : Math.round(p) + "%";
    }

    async function loadDistribution(code) {
      const card = document.getElementById("distCard"), body = document.getElementById("distBody");
      distCharts.forEach((c) => c.destroy()); distCharts = [];
      let data;
      try { data = await api("/api/foods/" + encodeURIComponent(code) + "/distribution"); }
      catch (e) { card.style.display = "none"; return; }
      const nuts = (data.nutrients || []).filter((n) => n.sample_size > 0);
      if (!nuts.length) { card.style.display = "none"; return; }
      document.getElementById("distCat").textContent =
        data.category ? `· ${data.category} ${nuts[0].sample_size.toLocaleString()}종` : "";
      body.innerHTML = nuts.map((n, i) => `
        <div class="${i ? "mt-4" : ""}">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="fw-bold">${n.name}</span>
            <span class="small text-muted">100g당 <b class="text-body">${n.value}${n.unit}</b> · <span class="text-danger fw-bold">상위 ${fmtPct(n.percentile)}</span></span>
          </div>
          <div style="height:180px"><canvas id="dist_${n.nutrient_code}"></canvas></div>
        </div>`).join("");
      card.style.display = "";
      nuts.forEach((n) => renderDistChart(n));
    }

    function renderDistChart(n) {
      const dark = currentTheme() === "dark";
      const txt = dark ? "#e8eaed" : "#191f28";
      const grid = dark ? "rgba(255,255,255,.08)" : "rgba(0,0,0,.06)";
      const vals = n.values || [];
      const BINS = 20;
      const maxV = Math.max(n.value * 1.1, ...vals, 1);
      const w = maxV / BINS;
      const dec = w < 1 ? 2 : (w < 10 ? 1 : 0);
      const counts = new Array(BINS).fill(0);
      vals.forEach((v) => { let i = Math.floor((v < 0 ? 0 : v) / w); if (i >= BINS) i = BINS - 1; counts[i]++; });
      const points = counts.map((c, i) => ({ x: (i + 0.5) * w, y: c }));
      const barColor = dark ? "rgba(148,163,184,0.28)" : "rgba(148,163,184,0.40)";
      // KDE(가우시안) — 막대(개수) 스케일에 맞춰 오버레이
      const cnt = vals.length;
      const mean = vals.reduce((a, b) => a + b, 0) / Math.max(1, cnt);
      const std = Math.sqrt(vals.reduce((a, b) => a + (b - mean) ** 2, 0) / Math.max(1, cnt - 1));
      let h = 1.06 * std * Math.pow(Math.max(1, cnt), -0.2);
      if (!(h > 0)) h = w;
      const GP = 80;
      const kdePts = Array.from({ length: GP + 1 }, (_, k) => {
        const x = (maxV * k) / GP;
        const d = vals.reduce((s, xi) => s + Math.exp(-0.5 * ((x - xi) / h) ** 2), 0) / (cnt * h * Math.sqrt(2 * Math.PI));
        return { x, y: d * cnt * w };
      });
      const chart = new Chart(document.getElementById("dist_" + n.nutrient_code), {
        type: "bar",
        data: { datasets: [
          { type: "bar", data: points, backgroundColor: barColor, borderRadius: 2, barPercentage: 1, categoryPercentage: 1, order: 2 },
          { type: "line", data: kdePts, borderColor: "#3182f6", backgroundColor: "rgba(49,130,246,0.12)", fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2, order: 1 },
        ] },
        options: { responsive: true, maintainAspectRatio: false,
          scales: {
            x: { type: "linear", min: 0, max: maxV, offset: false,
              ticks: { color: txt, maxRotation: 0, callback: (v) => +(+v).toFixed(dec) },
              grid: { display: false }, title: { display: true, text: `100g당 함량 (${n.unit})`, color: txt } },
            y: { beginAtZero: true, grace: "12%", title: { display: true, text: "식품 수", color: txt }, grid: { color: grid }, ticks: { color: txt, precision: 0 } },
          },
          plugins: { legend: { display: false },
            markerLine: { value: n.value, label: `이 식품 (상위 ${fmtPct(n.percentile)})` },
            tooltip: { filter: (item) => item.datasetIndex === 0,
              callbacks: { title: (t) => (t.length ? `${(+t[0].parsed.x).toFixed(dec)} ${n.unit} 부근` : ""), label: (ctx) => `식품 ${ctx.parsed.y}개` } } } },
      });
      distCharts.push(chart);
    }
    window.onThemeChange = () => { if (current) loadDistribution(current.code); };

    function onInput() {
      clearTimeout(timer);
      const q = document.getElementById("q").value.trim();
      if (!q) { document.getElementById("results").innerHTML = ""; return; }
      timer = setTimeout(doSearch, 250);
    }
    async function doSearch() {
      const q = document.getElementById("q").value.trim();
      if (!q) { document.getElementById("results").innerHTML = ""; return; }
      const seq = ++searchSeq;
      const foods = await api("/api/foods/search?q=" + encodeURIComponent(q) + "&limit=30");
      if (seq !== searchSeq) return;
      document.getElementById("results").innerHTML = foods.length
        ? foods.map((f) => `
            <button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" onclick="select('${f.code}')">
              <span>${f.name}</span>
              ${f.category ? `<span class="badge" style="background:var(--toss-blue-soft);color:var(--toss-blue)">${f.category}</span>` : ""}
            </button>`).join("")
        : "<div class='list-group-item text-muted small'>검색 결과가 없습니다.</div>";
    }

    async function select(code, amt) {
      current = await api("/api/foods/" + encodeURIComponent(code));
      document.getElementById("detailTitle").textContent = current.name;
      document.getElementById("catBadge").innerHTML = current.category
        ? `<span class="badge" style="background:var(--toss-blue-soft);color:var(--toss-blue)">${current.category}</span>` : "";

      if (!current.nutrients.length) {
        document.getElementById("baseSection").innerHTML = "<p class='text-muted mb-0'>등록된 영양성분 정보가 없습니다.</p>";
        document.getElementById("amtSection").style.display = "none";
        document.getElementById("distCard").style.display = "none";
        return;
      }
      // 상단: 기준량(100g) 기준 표
      document.getElementById("baseSection").innerHTML =
        `<h6 class="text-muted small mb-2">기준량 ${current.base_amount}${current.base_unit} 기준</h6>` + buildTable(1);
      // 하단: 입력 g수 기준 표
      document.getElementById("amt").value = (amt != null && amt > 0) ? amt : (current.base_amount || 100);
      document.getElementById("amtUnit").textContent = current.base_unit || "g";
      document.getElementById("amtSection").style.display = "";
      renderDetail();
      loadDistribution(code);  // 같은 분류 내 영양소 분포
    }

    function renderDetail() {
      if (!current || !current.nutrients.length) return;
      const base = (current.base_amount || 100) || 100;
      const amt = parseFloat(document.getElementById("amt").value);
      const factor = !amt || amt <= 0 ? 0 : amt / base;
      document.getElementById("nutriTable").innerHTML = buildTable(factor);
    }

    function buildTable(factor) {
      const rows = current.nutrients.map((n) => {
        const val = Math.round(n.amount * factor * 10) / 10;
        let limitCell = "<span class='text-muted'>-</span>";
        if (n.daily_limit) {
          const pct = Math.round((val / n.daily_limit) * 100);
          const over = pct >= 100;
          limitCell = `<span class="${over ? "text-danger fw-bold" : "text-muted"}">${n.daily_limit}${n.unit} 중 ${pct}%</span>`;
        }
        return `<tr>
          <td>${n.name}</td>
          <td class="text-end fw-bold">${val}${n.unit}</td>
          <td class="text-end">${limitCell}</td>
        </tr>`;
      }).join("");
      return `
        <div class="table-responsive">
          <table class="table table-sm align-middle mb-0">
            <thead><tr><th>영양소</th><th class="text-end">함량</th><th class="text-end">일일 상한 대비</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // 딥링크: ?code=...&amt=... 로 들어오면 해당 식품 정보를 (섭취량 기준으로) 바로 표시
    (function () {
      const params = new URLSearchParams(location.search);
      const code = params.get("code"), amt = params.get("amt");
      if (code) select(code, amt != null ? parseFloat(amt) : undefined);
    })();
  </script>
</body>
</html>
